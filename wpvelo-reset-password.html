<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WPVelo — Redefinir Password</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'><rect width='120' height='120' rx='28' fill='url(%23gf)'/><path d='M32 34 L60 82 L88 34' stroke='%2307090d' stroke-width='8' stroke-linecap='round' stroke-linejoin='round' fill='none'/><circle cx='60' cy='82' r='6' fill='%2307090d'/><path d='M20 98 L38 98 L44 88 L60 108 L76 74 L82 98 L100 98' stroke='%2307090d' stroke-width='4.5' stroke-linecap='round' stroke-linejoin='round' fill='none' opacity='0.45'/><defs><linearGradient id='gf' x1='0' y1='0' x2='120' y2='120' gradientUnits='userSpaceOnUse'><stop offset='0%25' stop-color='%2300e8b0'/><stop offset='100%25' stop-color='%23009970'/></linearGradient></defs></svg>">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07090d;--s1:#0b0f16;--s2:#10151e;
  --border:rgba(255,255,255,0.055);--border2:rgba(255,255,255,0.10);
  --text:#e4eaf4;--muted:#7d8fa3;--dim:#4d5e72;
  --accent:#00d4a0;--accent2:rgba(0,212,160,0.09);--accent3:rgba(0,212,160,0.20);
  --red:#f05252;
  --font:'DM Sans',sans-serif;
  --font-display:'Syne',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;top:-20%;left:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(0,212,160,.05) 0%,transparent 70%);pointer-events:none}
body::after{content:'';position:fixed;bottom:-10%;right:-5%;width:400px;height:400px;background:radial-gradient(circle,rgba(61,142,255,.04) 0%,transparent 70%);pointer-events:none}

.card{
  background:var(--s1);
  border:1px solid var(--border2);
  border-radius:20px;
  padding:2.5rem 2rem;
  width:100%;max-width:380px;
  position:relative;z-index:1;
  box-shadow:0 24px 80px rgba(0,0,0,.5),0 0 0 1px rgba(0,212,160,.03);
}
.auth-logo{text-align:center;margin-bottom:2rem}
.auth-logo-svg{margin:0 auto .8rem;display:flex;justify-content:center}
.auth-title{font-family:var(--font-display);font-weight:800;font-size:1.5rem;color:#fff;letter-spacing:-.02em}
.auth-title span{color:var(--accent)}
.auth-sub{font-size:.82rem;color:var(--muted);margin-top:.3rem}
.auth-label{display:block;font-size:.7rem;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin:.9rem 0 .35rem}
.auth-input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:.8rem 1rem;color:var(--text);font-size:.9rem;outline:none;font-family:var(--font);transition:border-color .2s,box-shadow .2s}
.auth-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,160,.1)}
.auth-btn{width:100%;background:linear-gradient(135deg,var(--accent),#00a07a);border:none;border-radius:8px;padding:.9rem;color:#050e09;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:1.5rem;font-family:var(--font);transition:opacity .2s,transform .1s;letter-spacing:.01em}
.auth-btn:hover{opacity:.92;transform:translateY(-1px)}
.auth-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.msg-ok{font-size:.82rem;color:var(--accent);text-align:center;margin-top:.8rem;min-height:1.2rem;line-height:1.6;display:none}
.msg-err{font-size:.82rem;color:var(--red);text-align:center;margin-top:.8rem;min-height:1.2rem}
.back-link{display:block;text-align:center;font-size:.8rem;color:var(--muted);margin-top:1rem;cursor:pointer;transition:color .2s;background:none;border:none;font-family:var(--font);width:100%;padding:.3rem}
.back-link:hover{color:var(--accent)}
.state-icon{font-size:2.2rem;margin-bottom:.8rem;display:block;text-align:center}
</style>
</head>
<body>
<div class="card">
  <div class="auth-logo">
    <div class="auth-logo-svg">
      <svg width="46" height="46" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="120" height="120" rx="28" fill="url(#rp1)"/>
        <path d="M32 34 L60 82 L88 34" stroke="#07090d" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="60" cy="82" r="6" fill="#07090d"/>
        <path d="M20 98 L38 98 L44 88 L60 108 L76 74 L82 98 L100 98" stroke="#07090d" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.45"/>
        <defs><linearGradient id="rp1" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#00e8b0"/><stop offset="100%" stop-color="#009970"/></linearGradient></defs>
      </svg>
    </div>
    <div class="auth-title">WP<span>Velo</span></div>
    <div class="auth-sub" id="cardSub">Redefinir Password</div>
  </div>

  <div id="formArea">
    <label class="auth-label" for="newPass">Nova Password</label>
    <input id="newPass" class="auth-input" type="password" placeholder="mínimo 8 caracteres" autocomplete="new-password">
    <label class="auth-label" for="confPass">Confirmar Password</label>
    <input id="confPass" class="auth-input" type="password" placeholder="repete a nova password" autocomplete="new-password">
    <button id="btn" class="auth-btn">Redefinir Password</button>
    <div id="msgOk" class="msg-ok"></div>
    <div id="msgErr" class="msg-err"></div>
    <button class="back-link" onclick="window.location.href='wpvelo-dashboard.html'">← Voltar ao login</button>
  </div>
</div>

<script>
const API = 'https://sitepulse-backend-duqg.onrender.com';
const params = new URLSearchParams(window.location.search);
const token  = params.get('token');

if (!token) {
  document.getElementById('cardSub').textContent = 'Link inválido ou expirado';
  document.getElementById('formArea').innerHTML = `
    <span class="state-icon">🔗</span>
    <p style="font-size:.85rem;color:var(--muted);text-align:center;line-height:1.7">
      Este link é inválido ou já foi utilizado.<br>
      Solicita um novo link de recuperação.
    </p>
    <button class="back-link" onclick="window.location.href='wpvelo-dashboard.html'" style="margin-top:1.2rem;color:var(--accent)">
      ← Voltar ao login
    </button>`;
}

document.getElementById('btn') && document.getElementById('btn').addEventListener('click', doReset);
document.getElementById('confPass') && document.getElementById('confPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doReset();
});

async function doReset() {
  const btn     = document.getElementById('btn');
  const msgOk   = document.getElementById('msgOk');
  const msgErr  = document.getElementById('msgErr');
  const newPass = document.getElementById('newPass').value;
  const conf    = document.getElementById('confPass').value;

  msgErr.textContent = ''; msgOk.style.display = 'none';

  if (!newPass || !conf)  { msgErr.textContent = 'Preenche os dois campos.'; return; }
  if (newPass.length < 8) { msgErr.textContent = 'A password deve ter pelo menos 8 caracteres.'; return; }
  if (newPass !== conf)   { msgErr.textContent = 'As passwords não coincidem.'; return; }

  btn.disabled = true; btn.textContent = 'A redefinir...';

  try {
    const r = await fetch(API + '/api/auth/reset-password', {
      method:  'POST',
      headers: {'Content-Type': 'application/json'},
      body:    JSON.stringify({ token, password: newPass })
    });
    const d = await r.json();

    if (d.success) {
      document.getElementById('newPass').closest('div') && (document.getElementById('newPass').style.display = 'none');
      document.getElementById('confPass').style.display = 'none';
      document.querySelectorAll('.auth-label').forEach(l => l.style.display = 'none');
      btn.style.display = 'none';
      msgOk.innerHTML = '✓ Password redefinida com sucesso!<br><span style="color:var(--muted);font-size:.78rem">A redirecionar para o login em 3 segundos...</span>';
      msgOk.style.display = 'block';
      setTimeout(() => { window.location.href = 'wpvelo-dashboard.html'; }, 3000);
    } else {
      msgErr.textContent = d.error || 'Erro ao redefinir. O link pode ter expirado.';
      btn.disabled = false; btn.textContent = 'Redefinir Password';
    }
  } catch(e) {
    msgErr.textContent = 'Erro de ligação ao servidor. Tenta novamente.';
    btn.disabled = false; btn.textContent = 'Redefinir Password';
  }
}
</script>
</body>
</html>
